---
name: CI

"on":
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        julia-version: ['1.10', '1.12']
    steps:
      - uses: actions/checkout@v6

      - name: Set up Julia
        uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.julia-version }}

      - uses: julia-actions/cache@v2

      - name: Install dependencies
        run: julia --project=. -e "using Pkg; Pkg.instantiate()"

      - name: Run tests
        run: julia --project=. -e "using Pkg; Pkg.test(; coverage=false)"

  automerge:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      needs.test.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Check for workflow file changes
        id: changed
        run: |
          if git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD | grep -q '^.github/workflows/'; then
            echo "workflows_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "workflows_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable auto-merge for Dependabot PRs
        if: steps.changed.outputs.workflows_changed != 'true'
        run: gh pr merge --auto --squash "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
